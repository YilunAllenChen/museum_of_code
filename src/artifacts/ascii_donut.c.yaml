title: ASCII Donut
language: C
status: OnExhibit
hall: HallOfArt
tags: ["Terminal", "Animation"]
code: |-
  float A = 0, B = 0;
  for (;;) {
    float z[1760] = {0};
    char b[1760];
    memset(b, 32, 1760);
    for (float j = 0; j < 6.28; j += 0.07)
      for (float i = 0; i < 6.28; i += 0.02) {
        float c = sin(i), d = cos(j), e = sin(A), f = sin(j), g = cos(A), h = d + 2;
        float D = 1 / (c * h * e + f * g + 5), l = cos(i), m = cos(B), n = sin(B);
        int x = 40 + 30 * D * (l * h * m - f * n);
        int y = 12 + 15 * D * (l * h * n + f * m);
        int o = x + 80 * y;
        int N = 8 * ((f * e - c * d * g) * m - c * d * e - f * g - l * d * n);
        if (22 > y && y > 0 && x > 0 && 80 > x && D > z[o]) {
          z[o] = D;
          b[o] = ".,-~:;=!*#$@"[N > 0 ? N : 0];
        }
      }
    printf("\x1b[H");
    for (int k = 0; k < 1760; k++) putchar(k % 80 ? b[k] : '\n');
    A += 0.04; B += 0.02;
  }
desc: |-
  A rotating torus rendered entirely with ASCII characters in the terminal.

  This artifact is a classic blend of math, performance tricks, and playful visual expression.
